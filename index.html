<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билеты | Группа 543</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: #141414;
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.2rem;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2.2rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1.2rem;
        }

        .header h1 {
            font-weight: 500;
            font-size: 2rem;
            color: #eee;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            color: #aaa;
            margin-right: 12px;
        }

        .group-badge {
            background: #222;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1.2rem;
            color: #c0c0c0;
            border: 1px solid #3a3a3a;
            box-shadow: inset 0 1px 0 #3f3f3f;
        }

        .group-badge i {
            margin-right: 8px;
            color: #999;
        }

        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.9rem;
            margin-bottom: 1.8rem;
        }

        @media (max-width: 800px) {
            .ticket-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (max-width: 550px) {
            .ticket-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }

        .ticket-btn {
            background: #1e1e1e;
            border: none;
            border-radius: 16px;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: #d0d0d0;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 2px 0 #0b0b0b;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.3;
        }

        .ticket-btn i {
            font-size: 0.7rem;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .ticket-btn:hover {
            background: #2d2d2d;
            color: #ffffff;
            transform: scale(1.04);
            border-color: #555;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
        }

        .ticket-btn:hover i {
            opacity: 1;
        }

        .ticket-btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 1.2rem;
            text-align: right;
            color: #3a3a3a;
            font-size: 0.9rem;
            border-top: 1px solid #222;
            padding-top: 1rem;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #171717;
            border-radius: 2.2rem;
            max-width: 780px;
            width: 94%;
            max-height: 82vh;
            padding: 2rem 2rem 1.8rem;
            border: 1px solid #3a3a3a;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            transform: translateY(12px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1), opacity 0.25s;
            opacity: 0;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-box::-webkit-scrollbar {
            width: 5px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 10px;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.6rem;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 0.8rem;
        }

        .modal-header h2 {
            font-weight: 400;
            font-size: 1.7rem;
            color: #f0f0f0;
            letter-spacing: -0.3px;
        }

        .modal-header h2 small {
            font-size: 0.9rem;
            font-weight: 300;
            color: #999;
            margin-left: 10px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #777;
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.3s, color 0.2s;
            line-height: 1;
            padding: 0 6px;
        }

        .close-modal:hover {
            color: #d0d0d0;
            transform: rotate(90deg);
        }

        /* Стили для содержимого */
        .modal-body {
            color: #cfcfcf;
            font-size: 1rem;
            line-height: 1.7;
            word-break: break-word;
            padding-right: 4px;
        }

        /* Блок вопроса */
        .modal-body .q-block {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #2a2a2a;
        }

        .modal-body .q-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        /* Номер вопроса — КРУПНЫЙ и ВЫДЕЛЕННЫЙ */
        .modal-body .q-num {
            display: inline-block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5f5f5;
            background: #282828;
            padding: 0.1rem 0.8rem;
            border-radius: 10px;
            margin-right: 8px;
            border: 1px solid #3f3f3f;
            min-width: 2.2rem;
            text-align: center;
        }

        /* Заголовок вопроса (первая строка) */
        .modal-body .q-title {
            font-weight: 600;
            color: #e8e8e8;
            font-size: 1.05rem;
            display: inline;
        }

        /* Текст ответа — обычный размер */
        .modal-body .q-text {
            margin-top: 0.5rem;
            padding-left: 0.3rem;
            font-size: 1rem;
        }

        /* Подпункты с дефисом */
        .modal-body .q-text .list-dash {
            display: block;
            margin: 0.15rem 0 0.15rem 1.8rem;
            padding-left: 0.3rem;
            position: relative;
        }

        .modal-body .q-text .list-dash::before {
            content: "—";
            color: #777;
            position: absolute;
            left: -1.2rem;
        }

        /* Подпункты с точкой */
        .modal-body .q-text .list-bullet {
            display: block;
            margin: 0.15rem 0 0.15rem 1.8rem;
            padding-left: 0.3rem;
            position: relative;
        }

        .modal-body .q-text .list-bullet::before {
            content: "•";
            color: #888;
            position: absolute;
            left: -1.2rem;
        }

        /* Подпункты второго уровня */
        .modal-body .q-text .list-sub {
            display: block;
            margin: 0.1rem 0 0.1rem 3.2rem;
            padding-left: 0.3rem;
            position: relative;
            color: #b8b8b8;
        }

        .modal-body .q-text .list-sub::before {
            content: "◦";
            color: #666;
            position: absolute;
            left: -1.2rem;
        }

        /* Жирный текст внутри ответа */
        .modal-body .q-text strong {
            color: #e0e0e0;
            font-weight: 500;
        }

        /* Ссылки */
        .modal-body .ref-link {
            color: #8ab4f8;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.2s;
        }

        .modal-body .ref-link:hover {
            color: #b0d4ff;
        }

        @media (max-width: 450px) {
            .container {
                padding: 1rem;
            }
            .ticket-btn {
                font-size: 1rem;
                padding: 0.7rem 0;
            }
            .modal-box {
                padding: 1.3rem;
            }
            .modal-header h2 {
                font-size: 1.3rem;
            }
            .modal-body .q-num {
                font-size: 1.2rem;
                padding: 0 0.5rem;
                min-width: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-ticket-alt"></i> Экзаменационные билеты</h1>
        <div class="group-badge"><i class="fas fa-users"></i> Группа 543</div>
    </div>

    <div class="ticket-grid" id="ticketGrid"></div>

    <div class="footer-note">
        <i class="fas fa-arrow-right"></i> 30 билетов · нажми на номер, чтобы открыть
    </div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Билет <span id="modalNumber">0</span> <small id="modalSubject"></small></h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    (function() {
        // -----------------------------------------------------------------
        // ФУНКЦИЯ ДЛЯ ФОРМАТИРОВАНИЯ СПИСКОВ В ТЕКСТЕ
        // Убираем все цифры (1., 2., 3.) внутри ответов
        // -----------------------------------------------------------------
        function formatLists(text) {
            let lines = text.split('\n');
            let result = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let trimmed = line.trim();

                if (trimmed === '') {
                    result.push('');
                    continue;
                }

                // Убираем нумерацию в начале строки (1., 2., 3. и т.д.)
                // Оставляем только текст после номера
                let cleaned = trimmed.replace(/^\d+\.\s*/, '');

                // Проверяем на дефис: "— текст"
                let matchDash = cleaned.match(/^—\s+(.+)/);
                if (matchDash) {
                    result.push(`<span class="list-dash">${matchDash[1]}</span>`);
                    continue;
                }

                // Проверяем на точку: "• текст"
                let matchBullet = cleaned.match(/^•\s+(.+)/);
                if (matchBullet) {
                    result.push(`<span class="list-bullet">${matchBullet[1]}</span>`);
                    continue;
                }

                // Проверяем на подпункт второго уровня: "  - текст" или "  • текст"
                let matchSub = cleaned.match(/^\s*[-•]\s+(.+)/);
                if (matchSub && line.match(/^\s{2,}/)) {
                    result.push(`<span class="list-sub">${matchSub[1]}</span>`);
                    continue;
                }

                // Проверяем на "Важно:" и подобные выделения
                let matchImportant = cleaned.match(/^(Важно|Запрещается|Применение|Свойства|Классификация|Виды|Особенности|Назначение|Устройство|Принцип действия|Правила работы|Требования|Основные данные|Основные материалы|Степени тяжести|Местные электротравмы|Общие электротравмы):\s*(.+)/);
                if (matchImportant) {
                    result.push(`<strong>${matchImportant[1]}:</strong> ${matchImportant[2]}`);
                    continue;
                }

                // Обычный текст
                result.push(cleaned);
            }

            return result.join('\n');
        }

        // -----------------------------------------------------------------
        // ПОЛНЫЕ ДАННЫЕ ВСЕХ 30 БИЛЕТОВ
        // Внутри ответов убрана вся нумерация — только текст и маркеры
        // -----------------------------------------------------------------
        const ticketsData = [
            {
                number: 1,
                subject: "Спецтехнология",
                text: `1. Классификация ОИ по физическому принципу действия.\nОхранные извещатели (ОИ) классифицируются по физическому принципу действия в зависимости от того, какое физическое поле или изменение параметров среды они контролируют для обнаружения вторжения. Основные типы:\n• Электроконтактные: Реагируют на размыкание или замыкание электрической цепи. Это простейший тип, часто используемый для блокировки дверей, окон. Срабатывают при механическом воздействии на контакты.\n• Магнитоконтактные (герконовые): Состоят из герметичного контакта (геркона) и магнита. Срабатывают при изменении взаимного расположения этих элементов, например, при открывании двери.\n• Ударно-контактные: Реагируют на вибрацию и ударные воздействия, возникающие при попытке разрушить преграду (стену, стекло).\n• Пьезоэлектрические: Используют пьезоэлектрический эффект — возникновение электрического заряда на поверхности кристалла при его механической деформации. Чувствительны к вибрациям и ударам.\n• Емкостные: Реагируют на изменение электрической емкости чувствительного элемента, которое происходит при приближении человека или предмета. Часто используются для охраны металлических сейфов и предметов.\n• Световые (фотоэлектрические): Состоят из источника света и фотоприемника. Срабатывают при пересечении светового луча. Бывают активными (источник и приемник разделены) и пассивными (приемник регистрирует изменение естественного освещения).\n• Акустические: Реагируют на звуковые волны определенной частоты, обычно на звук разбиваемого стекла.\n• Радиоволновые: Создают вокруг себя электромагнитное поле. Срабатывают при изменении этого поля движущимся объектом.\n• Сейсмические: Реагируют на колебания земной поверхности или строительных конструкций, вызванные передвижением человека или тяжелой техники.\n• Комбинированные: Объединяют два и более принципа действия (например, пассивный ИК- и СВЧ-каналы) для повышения надежности и снижения ложных срабатываний.\n• Ультразвуковые: Используют отраженный ультразвуковой сигнал. Срабатывают при изменении доплеровского сдвига частоты, вызванного движущимся объектом.\n\n2. Охарактеризуйте припои и флюсы.\nПрипои — это металлические сплавы, используемые для соединения деталей путем пайки. Они имеют температуру плавления ниже, чем соединяемые материалы.\nКлассификация по температуре плавления:\n— Мягкие (легкоплавкие): Температура плавления до 450°C. Наиболее распространены оловянно-свинцовые припои (ПОС). Применяются для пайки электронных компонентов, радиомонтажа, в сантехнике.\n— Твердые (тугоплавкие): Температура плавления выше 450°C. К ним относятся медно-цинковые (ПМЦ), серебряные (ПСр) и другие сплавы. Используются для пайки деталей, испытывающих высокие механические нагрузки и температуры (например, в холодильной технике, инструменте).\nСвойства: Хорошая смачиваемость, прочность, коррозионная стойкость, электропроводность. Основная характеристика — температура плавления и механическая прочность шва.\nПрименение: Широко используется в электронике, приборостроении, машиностроении и строительстве для создания неразъемных, герметичных и электропроводящих соединений.\nФлюсы — это вещества, используемые для удаления оксидной пленки с поверхности металлов и защиты их от окисления в процессе пайки. Они обеспечивают хорошее растекание припоя.\nКлассификация:\n— Активные (кислотные): Содержат кислоты (например, хлористый цинк). Обладают высокой химической активностью, но после пайки требуют тщательной отмывки, так как могут вызывать коррозию. Используются для пайки черных металлов.\n— Слабоактивные (канифольные): На основе канифоли или ее производных. Применяются для пайки меди, латуни, серебра, особенно в радиоэлектронике, где остатки флюса не вызывают коррозии и не снижают изоляционное сопротивление.\n— Бескислотные: Используются для пайки легкоокисляющихся металлов (алюминий, нержавеющая сталь).\n\n3. Перечислите и охарактеризуйте противопожарное оборудование и инвентарь.\nЭто средства, предназначенные для обнаружения и тушения пожаров.\n— Первичные средства пожаротушения: Используются для ликвидации небольших возгораний. К ним относятся:\n  - Огнетушители (ручные и передвижные): Воздушно-пенные, порошковые, углекислотные.\n  - Внутренние пожарные краны: Устанавливаются в зданиях, состоят из рукава, ствола и вентиля, подключаются к водопроводной сети.\n  - Ящики с песком, лопаты, ведра, асбестовые и войлочные покрывала: Используются для тушения небольших очагов и легковоспламеняющихся жидкостей.\n— Системы пожарной сигнализации: Состоят из извещателей (датчиков, реагирующих на дым, тепло или пламя) и приемно-контрольных приборов. Предназначены для автоматического обнаружения пожара и оповещения людей.\n— Системы пожаротушения: Автоматические установки (спринклерные и дренчерные), которые активируются при пожаре и подают воду или пену на защищаемый участок.\n— Пожарный инструмент и инвентарь: Топоры, багры, ломы, ведра, огнетушители, лопаты, ящики для песка. Используются для вскрытия конструкций, растаскивания горящих материалов и выполнения первичных действий по тушению.`
            },
            {
                number: 2,
                subject: "Электроматериаловедение",
                text: `1. Охарактеризуйте поверхностные извещатели.\nПоверхностные извещатели — это подкласс охранных извещателей, которые реагируют на изменение состояния охраняемой поверхности. Принцип их действия основан на разрушении тонкой проволоки или фольги, наклеенной на поверхность (стекло, стена). При попытке разбить стекло или взломать преграду, проволока обрывается, что фиксируется как тревожный сигнал. Они просты и надежны, но однократны (требуют замены после срабатывания) и могут повреждаться от вибраций и перепадов температуры. Их назначение — защита остекленных конструкций от разбивания.\n\n2. Перечислите виды, свойства, применение жидких диэлектриков.\nЖидкие диэлектрики — это вещества в жидком состоянии, используемые для изоляции и отвода тепла в электротехнических устройствах.\nВиды:\n— Нефтяные масла: Трансформаторное, конденсаторное, кабельное. Получаются из нефти.\n— Синтетические жидкости: Кремнийорганические, фторорганические, эфиры.\n— Растительные масла: Используются ограниченно (например, в некоторых конденсаторах).\nСвойства:\n— Высокая электрическая прочность: Способность выдерживать высокое напряжение без пробоя.\n— Малая диэлектрическая проницаемость и малый тангенс угла диэлектрических потерь: Обеспечивают низкие потери энергии.\n— Малая вязкость: Обеспечивает хорошую циркуляцию и отвод тепла.\n— Высокая температура вспышки: Обеспечивает пожарную безопасность.\n— Химическая стабильность: Устойчивость к окислению и старению.\nПрименение:\n— Трансформаторные масла: Для заливки силовых трансформаторов, выполняют роль изоляции и охлаждения.\n— Конденсаторные масла: В силовых конденсаторах для увеличения электрической прочности.\n— Кабельные масла: Для пропитки бумажной изоляции силовых кабелей.\n— Выключатели: Для гашения электрической дуги в масляных выключателях.\n\n3. Объясните поочередность оказания первой (доврачебной) помощи при обмороке, тепловом и солнечном ударах.\nПервая помощь при этих состояниях направлена на восстановление нормальной работы мозга и сердца:\n— Прекратить воздействие повреждающего фактора:\n  - При обмороке: Уложить пострадавшего на спину на ровную поверхность, приподнять ноги.\n  - При тепловом/солнечном ударе: Перенести пострадавшего в прохладное, тенистое место, расстегнуть стесняющую одежду.\n— Обеспечить доступ свежего воздуха (открыть окно, включить вентилятор).\n— Восстановить сознание:\n  - Дать понюхать нашатырный спирт (на ватке).\n  - Обрызгать лицо холодной водой, похлопать по щекам.\n— Охлаждение (при тепловом/солнечном ударе):\n  - Приложить холодные компрессы (пакеты со льдом, холодные мокрые полотенца) к голове (лоб, затылок), шее, подмышкам и паховой области.\n  - Если сознание не восстановилось (отсутствие пульса, дыхания), немедленно приступить к сердечно-легочной реанимации (непрямой массаж сердца и искусственное дыхание) до прибытия скорой помощи.`

            {
                number: 3,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия автоматических извещателей.\nНазначение: Автоматические извещатели (пожарные и охранные) предназначены для автоматического обнаружения факторов пожара (дым, тепло, пламя) или признаков вторжения (движение, звук, вибрация) и формирования сигнала тревоги без участия человека. Являются основными элементами систем пожарной и охранной сигнализации.\nУстройство: Состоят из чувствительного элемента (сенсора), анализирующего блока и системы индикации. Чувствительный элемент реагирует на контролируемый параметр (температуру, свет, звук) и преобразует его в электрический сигнал. Анализирующий блок сравнивает сигнал с пороговым значением и при превышении формирует сигнал "Тревога".\nПринцип действия: Принцип работы сильно зависит от типа извещателя.\n— Тепловой: Реагирует на превышение температуры или на скорость её нарастания.\n— Дымовой: Реагирует на появление дыма (ионизационный или оптический).\n— Пламени: Реагирует на ультрафиолетовое или инфракрасное излучение открытого пламени.\n— Охранный (движения): Реагирует на движение в охраняемой зоне (световой, радиоволновой, ультразвуковой).\n\n2. Охарактеризуйте проводниковые материалы с малым удельным электрическим сопротивлением: классификация, виды, свойства, применение.\nЭто материалы, которые хорошо проводят электрический ток. Их основная характеристика — малое удельное электрическое сопротивление (ρ).\nКлассификация:\n— Металлы высокой проводимости: Медь, алюминий, золото, серебро.\n— Сплавы: Бронза, латунь (используются для специальных целей).\nВиды, свойства и применение:\n— Медь (Cu): Обладает очень низким удельным сопротивлением (0,0175 Ом·мм²/м), высокой проводимостью, хорошей пластичностью и коррозионной стойкостью. Применяется для изготовления обмоточных, установочных и монтажных проводов, шин, кабелей, в обмотках трансформаторов.\n— Алюминий (Al): Имеет немного большее удельное сопротивление, чем медь (0,028 Ом·мм²/м), но значительно легче и дешевле. Широко используется для воздушных линий электропередач (ЛЭП), в силовых кабелях, обмотках трансформаторов и в шинных конструкциях.\n— Серебро (Ag): Обладает наименьшим удельным сопротивлением (0,016 Ом·мм²/м), но очень дорогое. Применяется только в ответственных узлах, где важна миниатюризация и малые потери (например, контакты реле, высокочастотные кабели).\n— Золото (Au): Химически инертно, не окисляется. Используется в электронике для покрытия контактов в ответственных приборах.\n\n3. Опишите правила работы с углекислотным огнетушителем.\nУглекислотные огнетушители (ОУ) предназначены для тушения твердых, жидких веществ и электроустановок под напряжением до 1000 В.\nПравила работы:\n— Поднести огнетушитель к очагу возгорания на расстояние не менее 1 метра.\n— Направить раструб на горящую поверхность, убедившись, что он не направлен на людей.\n— Сорвать пломбу, нажать на рычаг или повернуть маховик (в зависимости от конструкции).\n— При тушении не держать раструб голой рукой, так как он сильно охлаждается (до -70°С) и может вызвать обморожение.\n— Тушить огонь следует с подветренной стороны, направляя струю на основание пламени.\nВажно: Запрещено использовать углекислотные огнетушители для тушения горящей одежды на человеке.`
            },
            {
                number: 4,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия комбинированных извещателей.\nНазначение: Комбинированные извещатели предназначены для повышения надежности обнаружения и снижения вероятности ложных срабатываний. Они используют два и более физических принципа обнаружения, например, совмещение пассивного инфракрасного (PIR) и СВЧ-радиоволнового каналов.\nУстройство: Состоят из двух или более чувствительных элементов разных типов (например, пироприемник и СВЧ-антенна), установленных в одном корпусе, и общей логической схемы обработки сигналов.\nПринцип действия: Тревожный сигнал формируется только при одновременном (или последовательном с определенным временем) срабатывании обоих каналов. Например, PIR-датчик реагирует на тепловое излучение человека, а СВЧ-датчик — на его движение. Такая схема "И" делает комбинированный извещатель значительно более устойчивым к помехам (например, к сквознякам, источникам тепла) по сравнению с одноканальными аналогами. Это наиболее надежный тип извещателей для охраны помещений.\n\n2. Перечислите виды, свойства, применение жидких диэлектриков.\nЭтот вопрос уже был частично рассмотрен в билете №2. Ответ можно повторить или дать в более сжатой форме:\n— Виды: Нефтяные (трансформаторное, кабельное, конденсаторное масла) и синтетические (кремнийорганические, фторорганические).\n— Свойства: Высокая электрическая прочность, малая вязкость для хорошего охлаждения, высокая температура вспышки для пожарной безопасности, химическая стойкость.\n— Применение: В качестве изоляции и охлаждающей жидкости в трансформаторах, конденсаторах, масляных выключателях и кабелях.\n\n3. Перечислите индивидуальные средства защиты от вибрации, шумовых и звуковых колебаний. Их применение.\nОт вибрации:\n— Виброизолирующая обувь: Специальная подошва, поглощающая вибрацию. Применяется при работе с виброинструментом (перфораторы, отбойные молотки).\n— Виброзащитные рукавицы и перчатки: Снабжены амортизирующими прокладками в области ладони.\n— Антивибрационные коврики/платформы: Используются на рабочих местах (например, за станками).\nОт шума и звуковых колебаний:\n— Противошумные наушники: Плотно охватывают уши, обеспечивая высокий уровень защиты. Применяются на производствах с высоким уровнем шума (кузнечные цеха, строительные площадки).\n— Вкладыши (беруши): Вставляются в ушной канал. Бывают разовые (из ваты, стекловолокна) и многоразовые (из эластичных полимеров). Удобны и компактны.\n— Шлемы: Используются для защиты от сверхсильного шума (например, в авиации, на испытательных стендах).`
            },
            {
                number: 5,
                subject: "Электроматериаловедение",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия световых извещателей.\nНазначение: Световые извещатели используются в системах охранной и пожарной сигнализации. В охранных системах они служат для обнаружения пересечения светового луча, что указывает на вторжение. В пожарных системах их основное назначение — подача светового сигнала "Пожар" для оповещения людей и обозначения путей эвакуации.\nУстройство: Состоят из источника света (обычно инфракрасный светодиод) и фотоприемника (фотодиод или фототранзистор).\nПринцип действия:\n— Активный (лучевой): Источник и приемник расположены в разных блоках. Приемник непрерывно принимает луч от источника. При пересечении луча (прерывании) формируется сигнал тревоги. Используются для охраны периметра и длинных коридоров.\n— Пассивный (PIR): Приемник регистрирует изменение инфракрасного излучения в поле зрения. Срабатывает при появлении движущегося объекта с температурой, отличной от фона (человек). Является одним из самых распространенных охранных извещателей.\n— Световые оповещатели (пожарные): Используются для визуального оповещения о пожаре. Работают от сигнала системы управления и излучают яркий свет (обычно красный или синий). Указывают путь эвакуации, могут мигать.\n\n2. Охарактеризуйте электроизоляционные бумаги и картоны.\nЭто волокнистые диэлектрические материалы, получаемые из целлюлозы (древесной, хлопковой) или синтетических волокон.\nСвойства: Обладают хорошими электроизоляционными свойствами, гибкостью, способностью впитывать и удерживать пропитывающие составы (масло, лак). Гигроскопичны (впитывают влагу), что снижает их изоляционные свойства, поэтому требуют сушки и пропитки. Основные виды: кабельная, телефонная, конденсаторная, электроизоляционная бумага; электротехнический картон (прессшпан, электрокартон).\nПрименение: Используются в качестве изоляции обмоток трансформаторов, в силовых кабелях (пропитка маслом), в конденсаторах, в качестве основы для лакированных тканей, для изготовления прокладок, шайб и панелей из электрокартона.\n\n3. Перечислите виды инструктажей по охране труда, их содержание.\nИнструктажи — это обязательная форма обучения работников безопасности труда. Различают следующие виды:\n— Вводный инструктаж: Проводится с новыми работниками (вне зависимости от стажа и должности), а также с командированными. Проводится инженером по охране труда. Ознакомление с общими правилами поведения на территории, основными опасностями, правилами внутреннего трудового распорядка.\n— Первичный инструктаж на рабочем месте: Проводится до начала самостоятельной работы с каждым новым работником на его рабочем месте. Проводится руководителем работ (мастером, прорабом). Ознакомление с конкретными опасностями на данном участке, с безопасными приемами работы на конкретном оборудовании.\n— Повторный инструктаж: Проводится с той же периодичностью (обычно раз в 6 месяцев) для всех работников, прошедших первичный инструктаж. Проводится руководителем работ. Это проверка и закрепление знаний по безопасности на данном рабочем месте.\n— Внеплановый инструктаж: Проводится при изменении технологического процесса, при вводе нового оборудования, после перерыва в работе более 30 или 60 дней, по предписанию надзорных органов или после несчастного случая.\n— Целевой инструктаж: Проводится при выполнении разовых работ (не связанных с прямыми обязанностями), ликвидации аварий, проведении экскурсий. Проводится руководителем работ.`
            },
            {
                number: 6,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте особенности текущего ремонта емкостных приборов.\nЕмкостные приборы — это устройства, использующие изменение электрической емкости для обнаружения объектов. К ним относятся емкостные датчики приближения, уровнемеры, сигнализаторы.\nОсобенности ремонта:\n— Снятие остаточного заряда: Емкостные элементы могут долго сохранять заряд. Перед началом ремонта их необходимо обязательно разрядить через разрядное сопротивление во избежание поражения током.\n— Аккуратность при разборке: Датчик представляет собой конденсатор. Повреждение его конструктивных элементов (обкладок, изоляции) может изменить начальную емкость, что приведет к необходимости полной перенастройки.\n— Защита от загрязнений: Работа чувствительного элемента зависит от диэлектрической проницаемости среды. Попадание грязи, влаги, масла на чувствительный элемент может кардинально изменить его параметры. Поэтому ремонт проводится в чистой среде.\n— Калибровка и настройка: После любого вмешательства необходима точная калибровка прибора с помощью эталонных образцов или подстроечных элементов.\n— Проверка экранирования: Соединительные провода должны быть тщательно экранированы, так как даже незначительная емкость проводов может влиять на показания. Нарушение экранирования — частая причина неисправностей.\n\n2. Охарактеризуйте нефтяные масла.\nНефтяные масла — это жидкие диэлектрики, получаемые при перегонке нефти. Являются основным типом жидких диэлектриков.\nВиды: Трансформаторное масло, конденсаторное масло, кабельное масло, турбинное масло (используется как смазка и гидравлическая жидкость).\nСвойства: Низкая вязкость (обеспечивает охлаждение и циркуляцию), высокая электрическая прочность, высокая температура вспышки (110-160°C), низкая температура застывания (для работы на холоде), химическая инертность по отношению к материалам конструкции.\nПрименение:\n— Трансформаторное масло: В силовых трансформаторах как изоляция и охлаждающая среда.\n— Конденсаторное масло: Для пропитки бумажной изоляции конденсаторов.\n— Кабельное масло: Для пропитки бумажной изоляции высоковольтных кабелей.\n— Масляные выключатели: Для гашения электрической дуги.\n\n3. Перечислите и охарактеризуйте виды ответственности работников и нанимателей за нарушения законодательных и других нормативных правовых актов по охране труда.\nЗа нарушения законодательства по охране труда предусмотрены следующие виды ответственности:\n— Дисциплинарная: Налагается работодателем на работника за невыполнение трудовых обязанностей (нарушение правил ОТ). Меры: замечание, выговор, увольнение.\n— Административная: Наложение штрафов на должностных лиц и юридических лиц за нарушение норм и правил ОТ. Налагается государственными инспекторами труда, органами пожарного и санитарного надзора.\n— Материальная: Работник может возмещать ущерб, нанесенный им предприятию, а наниматель — возмещать вред, нанесенный здоровью работника (включая утраченный заработок, моральный вред).\n— Уголовная: Наступает за нарушения правил ОТ, повлекшие по неосторожности причинение тяжкого вреда здоровью или смерть человека. Наказание — штрафы, исправительные работы, лишение свободы на определенные сроки. Применяется судом.`
            },
            {
                number: 7,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия ручного действия пожарных извещателей.\nРучные пожарные извещатели (ИПР) — это устройства, предназначенные для ручного (принудительного) включения сигнала пожарной тревоги человеком при обнаружении пожара.\nНазначение: Обеспечить возможность быстрого оповещения о пожаре любым человеком, находящимся в здании.\nУстройство: Представляет собой корпус с кнопкой или рычагом, который необходимо нажать или сломать для активации. Внутри находится контактная группа, которая при нажатии замыкает электрическую цепь. Для защиты от случайного нажатия кнопка может закрываться прозрачной крышкой. Имеет систему индикации (светодиод), показывающую состояние (дежурный режим или срабатывание).\nПринцип действия: При нажатии кнопки или разбивании стекла (в некоторых моделях) замыкаются контакты, подается напряжение на шлейф сигнализации, что воспринимается приемно-контрольным прибором как сигнал "Пожар". Устанавливаются в коридорах, на лестничных клетках, в общественных местах на высоте 1,5 м.\n\n2. Охарактеризуйте основные свойства сверхпроводников.\nСверхпроводники — это материалы, которые при охлаждении ниже определенной критической температуры (Tc) теряют электрическое сопротивление полностью.\nОсновные свойства:\n— Нулевое электрическое сопротивление: Ток в сверхпроводящем кольце течет неограниченно долго без затухания.\n— Эффект Мейснера: Полное вытеснение магнитного поля из объема сверхпроводника. Это приводит к тому, что сверхпроводник "парит" над мощным магнитом (магнитная левитация).\n— Критическая температура: Температура перехода в сверхпроводящее состояние.\n— Критическое магнитное поле: При превышении определенной напряженности магнитного поля сверхпроводимость разрушается.\n— Критическая плотность тока: При превышении определенной плотности тока сверхпроводимость разрушается.\nПрименение: Создание мощных электромагнитов для МРТ, ускорителей частиц, магнитно-левитационных поездов, сверхмощных кабелей и высокочувствительных измерительных приборов (СКВИДы). Широкому применению мешает необходимость охлаждения до сверхнизких температур (жидкий гелий или азот).\n\n3. Опишите правила работы с воздушно-пенным огнетушителем.\nВоздушно-пенные огнетушители (ОВП) предназначены для тушения твердых веществ и легковоспламеняющихся жидкостей.\nПравила работы:\n— Поднести огнетушитель к очагу возгорания.\n— Сорвать пломбу.\n— Направить насадку-распылитель на очаг возгорания.\n— Нажать на рычаг или повернуть маховик (в зависимости от модели).\n— Тушить пламя с наветренной стороны, направляя струю пены под углом к поверхности горячей жидкости.\nЗапрещается: Тушение электроустановок под напряжением (так как пена проводит ток), а также тушение щелочных металлов.`
            },
            {
                number: 8,
                subject: "Электроматериаловедение",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия акустических извещателей.\nНазначение: Акустические извещатели предназначены для охраны помещений от проникновения через остекленные конструкции. Они реагируют на характерный звук разбитого стекла.\nУстройство: Состоят из чувствительного микрофона (электретного или конденсаторного), который воспринимает звуковые колебания, и электронного блока, который анализирует спектр поступившего сигнала. В современных извещателях используется анализ двух частот: низкой (звук удара) и высокой (звук бьющегося стекла). Срабатывание происходит только при поступлении обоих сигналов в правильной последовательности.\nПринцип действия: Микрофон преобразует звуковые волны в электрические сигналы. Процессор анализирует сигнал на соответствие частотным и временным характеристикам разбиваемого стекла. При обнаружении такого сигнала (сначала удар, потом звон стекла) формируется сигнал тревоги. Это позволяет отсеивать ложные срабатывания от других звуков (лай собаки, закрытая дверь). Эффективно защищает стеклянные поверхности от разбития.\n\n2. Дайте характеристику жаростойким проводниковым материалам.\nЖаростойкие проводниковые материалы — это материалы, способные длительное время работать при высоких температурах на воздухе без значительного окисления и изменения своих свойств. Их основное применение — изготовление нагревательных элементов.\nСвойства: Высокая температура плавления, стойкость к окислению (окалиностойкость), высокое удельное электрическое сопротивление (чтобы нагреватель был компактным), постоянство свойств при нагреве.\nОсновные материалы:\n— Нихром: Сплавы никеля с хромом (Х20Н80). Обладают высокой жаропрочностью, хорошо обрабатываются, стабильны в работе. Рабочая температура до 1100°C. Состоят из Ni (55-78%), Cr (15-23%), Fe, Mn. Используются в электрических печах, бытовых нагревателях.\n— Фехраль: Сплавы железа с хромом и алюминием (Х23Ю5). Имеют более высокую жаростойкость, чем нихром, и рабочую температуру до 1300-1400°C, но более хрупкие и менее стабильны. Дешевле нихрома.\n— Сплавы на основе тугоплавких металлов: Вольфрам, молибден, платина. Используются в специальной технике для сверхвысоких температур (например, в вакуумных печах, так как на воздухе быстро окисляются).\n\n3. Объясните, какие вы знаете индивидуальные средства защиты от статического электричества, их применение.\nДля защиты от статического электричества используются следующие индивидуальные средства:\n— Антистатическая обувь: Обувь с электропроводящей подошвой (содержащей углеродный наполнитель). Электрическое сопротивление подошвы не должно превышать 10^6 Ом. Применяется для отвода статического заряда с тела человека в землю.\n— Антистатическая одежда: Халаты, костюмы из хлопчатобумажной ткани или специальных синтетических тканей с вплетенными токопроводящими нитями. Обеспечивает стекание заряда с поверхности одежды. Применяется в электронной промышленности, на производствах с легковоспламеняющимися жидкостями и газами.\n— Антистатический браслет: Надевается на запястье и заземляется через специальный провод. Используется ремонтниками радиоэлектронной аппаратуры для защиты чувствительных микросхем от электростатических разрядов.\n— Антистатические коврики и покрытия: Используются на рабочих местах для снятия статического заряда с оборудования и человека.`
            },
            {
                number: 9,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия тепловых извещателей.\nНазначение: Тепловые пожарные извещатели предназначены для обнаружения пожара по повышению температуры в защищаемом помещении.\nУстройство: Чувствительный элемент может быть выполнен по-разному:\n— Плавкий элемент: Контакты замыкаются при расплавлении легкоплавкого припоя.\n— Биметаллический элемент: Две пластины с разным коэффициентом теплового расширения изгибаются при нагреве, замыкая контакты.\n— Термистор: Полупроводниковый резистор, сопротивление которого резко изменяется при нагреве. Этот сигнал обрабатывается электронной схемой.\n— Линейный (термокабель): Представляет собой кабель с термочувствительным покрытием, изменение сопротивления которого указывает на место нагрева.\nПринцип действия: Срабатывают при превышении температуры выше порогового значения (максимальные, порог обычно +54...+76 °С) или при высокой скорости нарастания температуры (дифференциальные, более 5°С/мин). При срабатывании замыкают (или размыкают) контакты в шлейфе сигнализации, что фиксируется приемно-контрольным прибором. Устанавливаются в помещениях, где дымовые извещатели не подходят (пыльные, загазованные).\n\n2. Дайте характеристику жаростойким проводниковым материалам.\nСм. билет №8.\n\n3. Объясните назначение ограждений, предохранительных и блокировочных устройств.\nЭто технические средства защиты, предназначенные для предотвращения доступа человека к опасным частям оборудования или предотвращения несчастных случаев.\n— Ограждения: Служат для физической изоляции движущихся частей, токоведущих частей, зон высоких температур. Бывают:\n  - Стационарные: Съемные и несъемные (защитные кожухи, сетки).\n  - Переносные: Временные (для ограничения зоны работ).\n— Предохранительные устройства: Служат для автоматического отключения оборудования при выходе какого-либо параметра (давление, температура, скорость) за безопасные пределы. К ним относятся предохранительные клапаны, разрывные мембраны, ограничители скорости, противовесы.\n— Блокировочные устройства: Обеспечивают невозможность включения оборудования при открытом ограждении или нарушении других условий безопасности. Они связывают работу механизма с положением ограждения или других элементов. Например, машина не запустится, пока не будет закрыт защитный кожух. Также бывают механические (остановка при открытии), электрические и оптические блокировки.`
            },
            {
                number: 10,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия световых извещателей.\nСм. билет №5.\n\n2. Перечислите и охарактеризуйте физико-химические характеристики материалов.\nФизико-химические характеристики описывают поведение материалов под воздействием внешних факторов.\n— Плотность (ρ): Масса единицы объема материала (кг/м³).\n— Температура плавления (Tпл): Температура перехода из твердого состояния в жидкое. Важна для жаростойких материалов и припоев.\n— Удельное электрическое сопротивление (ρ): Способность материала сопротивляться прохождению электрического тока (Ом·м). Чем меньше, тем лучше проводник.\n— Диэлектрическая проницаемость (ε): Способность материала ослаблять внешнее электрическое поле.\n— Коррозионная стойкость: Способность материала сопротивляться разрушению под действием химической среды (влаги, кислот).\n— Теплопроводность: Способность материала проводить тепло.\n— Температурный коэффициент линейного расширения (ТКЛР): Изменение размеров материала при изменении температуры.\n\n3. Объясните, как происходит расследование и учет несчастных случаев на производстве.\nПорядок расследования несчастных случаев регламентируется национальным законодательством.\n— Создание комиссии: Сразу после происшествия работодатель издает приказ о создании комиссии по расследованию. В состав комиссии входят представители нанимателя, профсоюза, инженер по охране труда. Для тяжелых, групповых и смертельных случаев комиссию возглавляет государственный инспектор труда.\n— Сроки расследования: Обычно составляют 3 дня для легких случаев и до 15 дней для тяжелых и смертельных. Сроки могут продлеваться.\n— Действия комиссии:\n  - Осмотр места происшествия, составление протокола.\n  - Опрос потерпевшего, свидетелей, должностных лиц.\n  - Изучение документов (инструкции, журналы инструктажей).\n  - Проверка технического состояния оборудования.\n— Акт о несчастном случае: По результатам расследования составляется акт по форме Н-1 или Н-П (для несвязанных с производством). В акте указываются причины, обстоятельства, виновные лица и предлагаются меры по устранению причин травмирования.\n— Учет: Акты регистрируются в специальном журнале. О несчастных случаях уведомляются надзорные органы и страховые компании для оформления страховых выплат.`
            },
            {
                number: 11,
                subject: "Электроматериаловедение",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия ударно-контактных извещателей.\nНазначение: Ударно-контактные извещатели предназначены для обнаружения попыток проникновения через стены, перекрытия, сейфы и другие конструкции путем разрушения преграды (ударом, разбитием, взломом). Реагируют на механические вибрации.\nУстройство: Состоит из чувствительного элемента, воспринимающего ударную волну. Это обычно пьезоэлектрическая пластина или контактная группа, где один контакт представляет собой инерционную массу (грузик) на пружине, а другой — неподвижный.\nПринцип действия: При ударе по охраняемой поверхности чувствительный элемент деформируется. Пьезоэлектрический элемент генерирует электрический импульс, а контактная группа от вибрации замыкается на короткое время. Электронная схема обрабатывает этот сигнал, отсеивает одиночные случайные колебания (помехи) и при наличии серии импульсов, характерных для ударного воздействия, формирует сигнал "Тревога". Устанавливаются на стенах, потолках, сейфах.\n\n2. Охарактеризуйте электрическую проводимость газообразных диэлектриков.\nГазы в нормальных условиях являются отличными диэлектриками, так как в них почти нет свободных носителей заряда.\n— Механизм проводимости: Проводимость газов носит ионизационный характер. Она возникает только под действием внешних ионизирующих факторов (ультрафиолетовое, рентгеновское излучение, радиация, сильное электрическое поле). Под их воздействием молекулы газа распадаются на положительные и отрицательные ионы и электроны, которые и создают электрический ток.\n— Закон Ома для газов: При малых напряженностях поля ток растет пропорционально напряжению (выполняется закон Ома) до тех пор, пока все образованные ионы не достигают электродов (ток насыщения). При дальнейшем увеличении напряжения (особенно при сильных неоднородных полях) происходит ударная ионизация, приводящая к газовому разряду (искровому, дуговому, тлеющему, коронному) — электрическому пробою газа. Электрическая прочность газов сильно зависит от давления, температуры и влажности.\n\n3. Перечислите средства и методы защиты от поражения электрическим током.\nДля защиты от поражения электрическим током используются следующие основные технические способы и средства:\n— Изоляция токоведущих частей (рабочая, дополнительная, усиленная): Основной способ защиты.\n— Защитное заземление: Преднамеренное соединение металлических нетоковедущих частей с землей.\n— Зануление: Соединение металлических нетоковедущих частей с нейтралью трансформатора.\n— Защитное отключение: Автоматическое отключение установки при опасном напряжении на корпусе.\n— Малое напряжение: Использование напряжения не выше 42 В для питания инструмента в опасных условиях.\n— Двойная изоляция: Применение инструмента с корпусом из изоляционного материала или с дополнительной изоляцией.\n— Выравнивание потенциалов: Снижение напряжения между доступными металлическими частями.\n— Сигнализация и блокировка: Предупреждают об опасности и предотвращают ошибочные действия.`
            },
            {
                number: 12,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия ручного действия пожарных извещателей.\nСм. билет №7.\n\n2. Охарактеризуйте основные свойства полупроводниковых материалов.\nПолупроводники — это материалы, занимающие промежуточное положение по электропроводности между проводниками и диэлектриками.\nОсновные свойства:\n— Собственная и примесная проводимость: Проводимость зависит от температуры, освещенности и наличия примесей.\n— Термочувствительность: Сильная зависимость сопротивления от температуры (термисторы).\n— Фотоэлектрические свойства: Изменение проводимости под действием света (фоторезисторы, фотодиоды) и генерация ЭДС при освещении (фотоэлементы).\n— Выпрямляющие свойства: Односторонняя проводимость на границе двух полупроводников с разным типом проводимости (p-n-переход). Это основа всех полупроводниковых диодов.\n— Усилительные свойства: Транзисторы способны усиливать электрические сигналы.\nОсновные материалы: Кремний (Si), германий (Ge), арсенид галлия (GaAs), карбид кремния (SiC), различные оксиды и сульфиды.\n\n3. Охарактеризуйте опасные и вредные производственные факторы.\nСогласно ГОСТ, они делятся на:\n— Опасные производственные факторы: Факторы, которые могут привести к травме (немедленному повреждению здоровья). Примеры: движущиеся машины, незащищенные токоведущие части, острые кромки, работа на высоте, горячие поверхности.\n— Вредные производственные факторы: Факторы, которые могут привести к профессиональному заболеванию (постепенному ухудшению здоровья). Примеры: шум, вибрация, неблагоприятный микроклимат, вредные химические вещества, недостаточная освещенность, тяжелый физический труд. Они подразделяются на:\n  - Физические: Шум, вибрация, освещенность, температура, излучения.\n  - Химические: Токсичные вещества (пары, газы, пыль).\n  - Биологические: Микроорганизмы, вирусы, грибки.\n  - Психофизиологические: Физические перегрузки, нервно-психические перегрузки.`
            },
            {
                number: 13,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия электроконтактных извещателей.\nНазначение: Электроконтактные извещатели (кнопки, педали) предназначены для ручной активации тревожной сигнализации человеком в экстренной ситуации, а также для автоматической блокировки дверей и окон.\nУстройство: Простейшее устройство — нормально разомкнутый или нормально замкнутый электрический контакт. При нажатии кнопки контактная группа замыкается (или размыкается), изменяя сопротивление шлейфа сигнализации. Для охраны периметра используются магнитоконтактные (герконовые) извещатели: это герметичный стеклянный баллон (геркон) с контактами и магнит, который их замыкает. При открывании двери магнит удаляется, контакты размыкаются.\nПринцип действия: Механическое воздействие на извещатель приводит к изменению состояния электрической цепи. Изменение сопротивления фиксируется приемно-контрольным прибором, который формирует сигнал тревоги. Могут быть автоматическими (срабатывают при воздействии) и неавтоматическими (требуют ручного включения).\n\n2. Охарактеризуйте основные полупроводниковые материалы.\nСм. билет №12.\n\n3. Объясните правила и последовательность выполнения искусственного дыхания способом «изо рта в рот».\nЭтот метод применяется при отсутствии дыхания у пострадавшего.\n— Обеспечить проходимость дыхательных путей: Уложить пострадавшего на спину на твердую поверхность. Запрокинуть голову назад (одна рука на лбу, другая приподнимает подбородок). Освободить ротовую полость от слизи и инородных предметов.\n— Сделать вдох: Глубоко вдохнуть.\n— Зажать нос пострадавшего: Пальцами руки, находящейся на лбу, зажать нос пострадавшего.\n— Произвести выдох в рот: Плотно прижать свои губы ко рту пострадавшего (можно через марлю) и сделать энергичный выдох. Объем выдыхаемого воздуха должен быть около 1-1,5 литров.\n— Пассивный выдох: Отстраниться, освободив нос пострадавшего, и дать возможность совершиться пассивному выдоху.\n— Повторять: Частота вдуваний — 12-20 раз в минуту. Продолжать до восстановления самостоятельного дыхания или до прибытия скорой помощи.`
            },
            {
                number: 14,
                subject: "Электроматериаловедение",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия магнитоконтактных извещателей.\nНазначение: Магнитоконтактные извещатели предназначены для блокировки дверей, окон, люков и других подвижных конструкций от открывания.\nУстройство: Состоит из двух частей: геркона (герметичного магнитоуправляемого контакта), который монтируется на неподвижной части (коробка двери), и постоянного магнита, который крепится на подвижной створке (дверь, окно).\nПринцип действия: Когда дверь закрыта, магнит находится рядом с герконом и удерживает его контакты в замкнутом состоянии. При открывании двери магнит удаляется, контакты геркона размыкаются (или наоборот, замыкаются, если используется контакт с обратной логикой). Это изменение состояния электрической цепи шлейфа сигнализации фиксируется приемно-контрольным прибором как нарушение.\n\n2. Охарактеризуйте компаунды.\nКомпаунды — это жидкие или пастообразные диэлектрические составы, которые применяются для заливки, пропитки и герметизации электронных узлов.\nВиды:\n— Эпоксидные: На основе эпоксидных смол. После отверждения с отвердителем образуют твердый, прочный и влагостойкий материал. Используются для жесткой фиксации и герметизации.\n— Силиконовые: На основе кремнийорганических полимеров. Сохраняют эластичность в широком диапазоне температур. Отлично изолируют, не выделяют вредных веществ, не повреждают чувствительные компоненты.\n— Полиуретановые: Эластичны, обладают хорошей адгезией и стойкостью к агрессивным средам.\nСвойства: Высокая электрическая прочность, влагостойкость, хорошая адгезия к различным материалам, низкий тангенс угла диэлектрических потерь, способность принимать форму изделия (защита от вибраций и механических нагрузок). Теплопроводность может регулироваться наполнителями.\nПрименение: Заливка трансформаторов, конденсаторов, катушек индуктивности, печатных плат; герметизация разъемов и кабельных вводов для защиты от влаги и агрессивных сред.\n\n3. Объясните порядок действий и правила эвакуации людей при пожаре.\nЭвакуация — организованный процесс вынужденного перемещения людей из опасной зоны.\n— Немедленное оповещение: При обнаружении пожара необходимо немедленно подать сигнал тревоги.\n— Остановка работ: Все работы в здании прекращаются.\n— Организованный выход: Люди должны покидать здание по заранее определенным путям эвакуации (коридоры, лестницы). Важно сохранять спокойствие, не создавать паники. Использовать лестницы, лифты запрещены (кроме специальных).\n— Помощь слабозащищенным: Особое внимание уделяется эвакуации детей, инвалидов, пожилых людей.\n— Сбор в безопасном месте: После выхода все собираются в заранее определенном месте для проверки наличия людей.\n— Правила: Двигаться быстро, но не бежать, держаться за поручни, при сильном задымлении использовать влажные ткани для защиты органов дыхания, пригнуться к полу (так как дым поднимается вверх).`
            },
            {
                number: 15,
                subject: "Охрана труда",
                text: `1. Перечислите требования к установке работоспособности точечных охранных извещателей.\nТочечные извещатели контролируют малую зону (условную "точку").\nТребования к установке:\n— Выбор места: Извещатели должны устанавливаться в местах, где они не будут подвергаться воздействию тепла, сквозняков, прямых солнечных лучей, мешающих их работе.\n— Высота установки: Обычно на высоте 2-2,5 метра от пола.\n— Шаг установки: Расстояние между извещателями и от извещателя до стены не должно превышать значений, указанных в технической документации, чтобы избежать "мертвых зон".\n— Защита от помех: Не должны устанавливаться вблизи источников электромагнитных помех.\n— Углы обзора: Должны быть учтены диаграммы направленности извещателей для обеспечения полного перекрытия охраняемой зоны.\n— Доступность: Должны быть обеспечены условия для их обслуживания и проверки.\n\n2. Охарактеризуйте ферриты.\nФерриты — это магнитные материалы, представляющие собой ферримагнитные оксиды железа (Fe₂O₃) с добавлением оксидов других металлов (никеля, цинка, марганца, магния и др.).\nСвойства:\n— Высокое удельное электрическое сопротивление: Это отличает их от металлических магнитных материалов. Благодаря этому потери на вихревые токи при высоких частотах минимальны.\n— Высокая магнитная проницаемость (μ): Для некоторых марок достигает нескольких тысяч.\n— Небольшие магнитные потери: Хорошо подходят для работы на высоких частотах (от кГц до МГц).\n— Хрупкость: Механически не прочны, плохо обрабатываются.\nКлассификация: По свойствам делятся на магнитно-мягкие (используются для высокочастотных сердечников) и магнитно-твердые (магниты).\nПрименение: Сердечники трансформаторов, дросселей, магнитных антенн, головок звукоснимателей, постоянные магниты, ферритовые кольца для подавления помех на кабелях.\n\n3. Объясните правила и последовательность выполнения искусственного дыхания способом «изо рта в нос».\nМетод применяется, если рот пострадавшего сильно поврежден или плотно сжат, или есть иные препятствия для дыхания через рот.\n— Подготовка: Уложить пострадавшего на спину, запрокинуть голову назад, очистить дыхательные пути.\n— Закрыть рот: Плотно закрыть рот пострадавшего.\n— Зажать нос или обхватить губами: Вдохнуть и сделать выдох в нос пострадавшего, плотно обхватив его губами.\n— Открыть рот для выдоха: Отстраниться и открыть рот пострадавшего, чтобы воздух мог свободно выйти.\n— Повторять: Частота — 12-20 раз в минуту. Продолжать до восстановления дыхания или прибытия помощи.`
            },
            {
                number: 16,
                subject: "Спецтехнология",
                text: `1. Способы проверки работоспособности точечных охранных извещателей.\nРаботоспособность проверяется периодически для обеспечения надежной охраны.\n— Визуальный осмотр: Проверка целостности корпуса, отсутствия загрязнений, индикации (светодиодный индикатор должен работать).\n— Имитация тревоги: Наиболее распространенный способ. Проверка осуществляется путем создания условий, имитирующих вторжение. Например:\n  - Для PIR-извещателя: человек проходит в контролируемой зоне.\n  - Для магнитоконтактного: открывается дверь.\n  - Для акустического: используется специальный имитатор звука разбитого стекла.\n  - Для электроконтактного: нажимается кнопка.\n— Проверка с помощью тестера: Измеряется сопротивление шлейфа, проверяется контактная группа.\n— Проверка по протоколу: После проверки составляется акт, в котором фиксируется дата проверки, результат и подписи ответственных лиц.\n\n2. Охарактеризуйте метод изучения внутреннего строения металлов и сплавов – магнитный анализ.\nМагнитный анализ — это метод неразрушающего контроля, основанный на изучении взаимодействия материала с магнитным полем. Метод позволяет оценить структуру и свойства ферромагнитных материалов (сталей).\n— Сущность метода: На образец воздействуют переменным или постоянным магнитным полем и измеряют характеристики намагниченности (коэрцитивная сила, остаточная индукция, магнитная проницаемость).\n— Что определяет:\n  - Качество термообработки: Твердость и структура напрямую связаны с магнитными свойствами.\n  - Глубину поверхностного упрочнения: Изменение магнитных свойств в поверхностном слое.\n  - Наличие внутренних напряжений и дефектов: Дефекты искажают структуру, что отражается на магнитных свойствах.\n— Применение: Контроль качества термической обработки деталей, определение твердости, контроль глубины закаленного слоя, обнаружение трещин и неоднородностей.\n\n3. Объясните правила оказания первой помощи при обмороке, тепловом и солнечном ударах.\nСм. билет №2.`
            },
            {
                number: 17,
                subject: "Электроматериаловедение",
                text: `1. Перечислите требования к установке работоспособности точечных охранных извещателей.\nСм. билет №15.\n\n2. Охарактеризуйте магнитно-мягкие материалы.\nМагнитно-мягкие материалы — это материалы, которые легко намагничиваются и легко перемагничиваются. Они обладают малой коэрцитивной силой.\n— Свойства: Высокая магнитная проницаемость (μ), низкая коэрцитивная сила (Hc), малые потери на гистерезис. Специфическое свойство — узкая петля гистерезиса.\n— Основные материалы: Электротехническая сталь, литая сталь, пермаллой (сплавы железа с никелем), ферриты (магнитно-мягкие), аморфные и нанокристаллические сплавы.\n— Применение: Используются для изготовления сердечников трансформаторов, дросселей, электромагнитов, генераторов, электрических машин (статоры, роторы). Основная цель — обеспечить концентрацию и усиление магнитного поля при минимальных потерях энергии. Ферриты, в частности, применяются на высоких частотах.\n\n3. Перечислите требования безопасности при работе с приставными лестницами.\nРабота с приставными лестницами требует соблюдения ряда мер:\n— Осмотр перед началом: Проверить целостность ступенек, наличие противоскользящих наконечников (башмаков), отсутствие трещин.\n— Угол наклона: Лестница должна устанавливаться под углом 60-70° к горизонтальной поверхности (соотношение 1:3 к высоте опоры).\n— Фиксация: Верхний конец лестницы должен быть надежно закреплен к опоре. Нижний конец должен быть установлен на твердое, ровное основание.\n— Запреты: Не разрешается работать с верхней ступеньки. Нельзя устанавливать лестницу на скользких поверхностях (лед, масло). Запрещено работать с лестницы на высоте более 5 метров.\n— Страховка: При работе на высоте более 1,3 м необходимо использовать предохранительный пояс.\n— Нахождение под лестницей: Запрещается находиться под лестницей и поднимать на нее тяжести.`
            },
            {
                number: 18,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте ПКП малой информационной емкости.\nПриемно-контрольные приборы (ПКП) — это центральные устройства систем сигнализации. ПКП малой информационной емкости предназначены для обслуживания небольших объектов (квартир, малых офисов).\nХарактеристики:\n— Количество шлейфов: Обычно от 1 до 4 (редко до 8). Каждый шлейф может обслуживать до 20-30 извещателей.\n— Тип питания: Могут питаться от сети 220 В и иметь встроенный резервный аккумулятор.\n— Ограниченный интерфейс: Простые индикаторы на корпусе (питание, тревога, неисправность) и небольшой дисплей.\n— Функциональность: Как правило, выполняют только основные функции: сбор сигналов с извещателей, питание их по шлейфу, выдача сигнала "Тревога" на сирену и на пульт централизованного наблюдения (ПЦН) по телефонной линии или GSM-каналу.\nНазначение: Охрана небольших помещений, частных домов. Позволяют контролировать до нескольких зон (двери, окна, датчики движения).\n\n2. Охарактеризуйте магнитно-твёрдые материалы.\nМагнитно-твердые материалы — это материалы, которые обладают большой коэрцитивной силой и остаточной намагниченностью, то есть способны сохранять намагниченность после снятия внешнего магнитного поля.\n— Свойства: Широкая петля гистерезиса, высокие значения коэрцитивной силы (Hc) и остаточной индукции (Br), большая удельная энергия магнитного поля.\n— Основные материалы: Литые стали (альни, альнико), ферриты, магниты на основе редкоземельных металлов (самарий-кобальт, неодим-железо-бор).\n— Применение: Изготовление постоянных магнитов. Используются в динамиках, микрофонах, измерительных приборах, электродвигателях постоянного тока, генераторах, магнитных сепараторах, холодильных магнитных системах.\n\n3. Объясните правила и последовательность выполнения непрямого (закрытого) массажа сердца.\nПрименяется при отсутствии пульса на сонной артерии и дыхания.\n— Положение пострадавшего: Уложить на твердую ровную поверхность (пол, землю) на спину. Освободить грудную клетку от одежды.\n— Положение рук: Найти мечевидный отросток грудины. Ладонь одной руки расположить на 2-3 см выше мечевидного отростка по центру грудины. Вторую руку положить на первую (или сцепить пальцы в замок). Руки прямые в локтях.\n— Нажатия: Делать энергичные толчки-нажатия на грудину с частотой 100-120 нажатий в минуту. Глубина продавливания грудины у взрослого человека должна быть 5-6 см.\n— Восстановление грудной клетки: После каждого нажатия необходимо полностью отпускать грудину, не отрывая рук, чтобы дать сердцу наполниться кровью.\n— Соотношение: Если реанимацию проводит один человек, то на 2 вдоха делается 30 нажатий. Если два человека — 2 вдоха на 15 нажатий.`

            {
                number: 19,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия сейсмических извещателей.\nНазначение: Сейсмические извещатели предназначены для охраны периметров и отдельных объектов (зданий, мостов) от проникновения или разрушения. Реагируют на колебания грунта или конструкций.\nУстройство: Чувствительный элемент — это геофон (магнитная катушка, подвижная в магнитном поле) или пьезоэлектрический датчик. Сигнал с датчика поступает на усилитель и процессор для обработки.\nПринцип действия: При передвижении человека, проезде транспорта или ударных воздействиях возникают колебания. Датчик преобразует эти колебания в электрический сигнал. Процессор анализирует сигналы и отсеивает помехи (дождь, ветер, движение мелких животных). При обнаружении характерного сигнала вторжения (например, шаги человека) формируется сигнал тревоги. Используются для охраны больших территорий (периметров) и важных объектов.\n\n2. Охарактеризуйте твёрдые органические диэлектрики.\nТвердые органические диэлектрики состоят из органических соединений на основе углерода.\nВиды:\n— Полимеры: Полиэтилен, полипропилен, поливинилхлорид (ПВХ), фторопласты (тефлон), полиамиды, эпоксидные смолы.\n— Волокнистые: Бумага, картон, хлопчатобумажные ткани, лакоткани.\n— Слюдяные и стеклянные: Хотя минералы, часто применяются в органических связующих.\nСвойства: Хорошая гибкость (у полимеров), высокая электрическая прочность, малый тангенс угла диэлектрических потерь (у фторопластов), влагопоглощение (у бумаги, картона), невысокая теплостойкость (кроме некоторых фторопластов до 250°C и полиамидов).\nПрименение: Изоляция проводов (ПВХ, полиэтилен), печатные платы (стеклотекстолит), обмотки (эмаль-изоляция), конструкционные детали (электрокартон, гетинакс), конденсаторы (пленочные, бумажные).\n\n3. Перечислите требования безопасности при выполнении работ на высоте со стремянок.\nСтремянки — это переносные лестницы с опорой.\nТребования:\n— Проверка: Осмотреть стремянку на предмет трещин, сколов, исправности фиксаторов (раскосов) и противоскользящих башмаков.\n— Раскрытие: Раскрыть стремянку полностью, зафиксировать раскосы-стяжки.\n— Установка: Устанавливать на ровную, твердую поверхность. Запрещено устанавливать на снег, лед, скользкие поверхности без дополнительных средств (щиты, противоскользящие накладки).\n— Запреты: Не разрешается работать с верхней ступеньки. Нельзя работать с приставной стремянки на высоте более 5 метров. Запрещено поднимать тяжести.\n— Страховка: Работы на высоте более 1,3 м требуют использования предохранительного пояса (при невозможности закрепиться за конструкцию, пояс не обязателен, но работа должна выполняться с особой осторожностью).\n— Количество людей: На стремянке разрешается находиться только одному человеку.`

            {
                number: 20,
                subject: "Электроматериаловедение",
                text: `1. Объясните влияние влажности воздуха и объема помещения на чувствительность ультразвуковых приборов.\nУльтразвуковые извещатели (УЗ) используют доплеровский эффект для обнаружения движения, излучая ультразвуковые волны (20-40 кГц).\n— Влияние влажности воздуха: Влажность воздуха оказывает значительное влияние на распространение ультразвука. Водяной пар является хорошим поглотителем ультразвуковых волн, особенно на высоких частотах. Повышенная влажность (туман, сырой воздух) приводит к сильному затуханию сигнала. Это уменьшает дальность действия извещателя и его чувствительность, так как отраженный от объекта сигнал может быть слишком слабым для детектирования.\n— Влияние объема помещения:\n  - Большой объем: В больших объемах сигнал затухает медленнее, но возникает проблема многократных отражений от стен, что может привести к появлению "мертвых зон" или ложных срабатываний.\n  - Малый объем: В малых замкнутых помещениях (комнаты) чувствительность хорошая, но также могут возникать стоячие волны из-за отражений от стен, что также может создавать "мертвые" или, наоборот, сверхчувствительные зоны. Поэтому УЗ-извещатели требуют тщательной настройки под конкретное помещение, особенно по ограничению дальности.\n\n2. Охарактеризуйте лаки и эмали.\nЭто жидкие или пастообразные электроизоляционные материалы, которые наносятся на поверхность и после высыхания образуют твердую пленку.\n— Лаки: Представляют собой раствор пленкообразователя (смолы, масла) в органическом растворителе. Свойства зависят от типа смолы. Могут быть прозрачными или цветными. Применяются:\n  - Для пропитки обмоток трансформаторов (улучшают изоляцию и отвод тепла).\n  - Для покрытия печатных плат (защита от влаги и пыли).\n  - Для изоляции проводов (эмаль-провода).\n— Эмали: Отличаются от лаков наличием в составе пигментов и наполнителей, которые делают их непрозрачными. Они обладают более высокой механической прочностью и защитными свойствами, чем лаки. Применяются для покрытия корпусов, панелей и других деталей для создания прочной изолирующей и антикоррозионной пленки.\n\n3. Перечислите индивидуальные средства защиты от статического электричества, их применение.\nСм. билет №8.`

            {
                number: 21,
                subject: "Охрана труда",
                text: `1. Охарактеризуйте основные тактико-технические данные емкостных извещателей.\nЕмкостные извещатели реагируют на изменение электрической емкости.\nОсновные данные:\n— Чувствительность: Определяется минимальным изменением емкости, которое может зафиксировать прибор (в пикофарадах, пФ). Чем выше чувствительность, тем на большее расстояние он реагирует.\n— Дальность действия: Зависит от размеров антенны (электрода) и ее расположения. Может быть от десятков сантиметров до нескольких метров. Для охраны предметов (сейф, картина) — малая дальность.\n— Вид и размер антенны: Открытая (провод), коаксиальный кабель, пластина.\n— Помехоустойчивость: Способность не срабатывать на изменения емкости от проходящих людей, перепадов температуры и влажности.\n— Время срабатывания: Малое (доли секунды).\nНазначение: Охрана металлических шкафов, сейфов, отдельных предметов, оконных рам. Также используются в системах контроля уровня жидкости.\n\n2. Охарактеризуйте клеи и вяжущие составы.\nКлеи и вяжущие — это вещества, способные скреплять различные материалы за счет адгезии.\n— Клеи: Представляют собой готовые к применению составы на основе синтетических смол (эпоксидные, полиуретановые, цианакрилатные ("суперклей"), ПВА, резиновые). Они обладают высокой адгезией к определенным материалам (металл, стекло, пластик, дерево) и могут быть термореактивными (отверждаются при нагреве) или термопластичными (размягчаются при нагреве). Широко применяются в электронике, строительстве и машиностроении для склеивания разнородных материалов.\n— Вяжущие составы: Это материалы, которые применяются для приготовления компаундов, герметиков или как основа для клея. К ним относятся эпоксидные, фенольные, кремнийорганические и другие смолы. Они не являются готовыми клеями, а служат базовым компонентом для их получения.\n\n3. Объясните правила оказания первой (доврачебной) помощи: при переломах, ушибах, вывихах, растяжениях.\n— Перелом (подозрение):\n  - Обездвижить: Обеспечить полную неподвижность поврежденной конечности с помощью шины (из подручных средств) или зафиксировав ее к здоровой части тела.\n  - Обезболить: Дать обезболивающее (если есть возможность и нет противопоказаний).\n  - Приложить холод: Приложить холод (пузырь со льдом, холодный компресс) к месту перелома для уменьшения отека.\n  - Вызвать скорую: Немедленно вызвать скорую помощь. Запрещено самостоятельно вправлять отломки костей.\n— Ушиб:\n  - Приложить холод к месту ушиба.\n  - Наложить давящую повязку для уменьшения отека.\n  - Обеспечить покой.\n— Растяжение связок:\n  - Обеспечить полный покой суставу.\n  - Наложить тугую повязку (эластичный бинт).\n  - Приложить холод.\n  - Возвышенное положение конечности.\n— Вывих:\n  - Обеспечить полную неподвижность сустава с помощью повязки или шины.\n  - Приложить холод.\n  - Запрещено самостоятельно вправлять вывих. Вызвать скорую.`

            {
                number: 22,
                subject: "Спецтехнология",
                text: `1. Охарактеризуйте назначение, устройство, принцип действия пассивных оптико-электронных извещателей.\nНазначение: Пассивные оптико-электронные (инфракрасные, PIR) извещатели предназначены для обнаружения движения человека в охраняемом помещении.\nУстройство: Основные элементы: пироприемник (чувствительный элемент к инфракрасному излучению), линза Френеля (фокусирует излучение на пироприемник) и электронный блок обработки сигнала.\nПринцип действия: Линза Френеля разбивает пространство на множество узких лучей ("лепестков"). Человек, двигаясь, пересекает эти лучи. В результате на пироприемник попадает переменный инфракрасный сигнал — тепло (инфракрасное излучение) движущегося объекта. Пироприемник преобразует этот сигнал в электрический. Процессор анализирует изменение сигнала и, если оно соответствует движению человека (по амплитуде, частоте), формирует сигнал "Тревога". Являются наиболее распространенными объемными извещателями.\n\n2. Охарактеризуйте ферриты.\nСм. билет №15.\n\n3. Перечислите виды травм и степень тяжести при воздействии электрического тока на организм человека.\nВоздействие тока на организм может вызвать различные травмы и последствия.\n— Местные электротравмы:\n  - Электрический ожог: Наиболее распространенная травма. Может быть контактным (в месте входа и выхода тока) или дуговым (от воздействия электрической дуги).\n  - Электрические знаки: Серо-белые или бледно-желтые пятна в месте входа тока.\n  - Электрометаллизация кожи: Внедрение в кожу частиц расплавленного металла.\n  - Электроофтальмия: Воспаление глаз от ультрафиолетового излучения электрической дуги.\n— Общие электротравмы (электрический удар): Воздействие на весь организм, нарушая работу жизненно важных органов (сердце, легкие, нервная система). К ним относятся фибрилляция сердца, остановка дыхания, паралич.\n— Степени тяжести:\n  - I степень: Судорожное сокращение мышц без потери сознания.\n  - II степень: Потеря сознания на короткое время.\n  - III степень: Потеря сознания с нарушениями дыхания и сердечной деятельности.\n  - IV степень (клиническая смерть): Отсутствие дыхания и кровообращения. Исход зависит от времени и качества оказания первой помощи.`

            {
                number: 23,
                subject: "Электроматериаловедение",
                text: `1. Опишите технологические особенности газовой сварки.\nГазовая сварка — процесс сварки плавлением, при котором нагрев и расплавление металла осуществляется пламенем газовой горелки (обычно ацетилен-кислородным).\nОсобенности:\n— Регулировка пламени: Важнейший момент — настройка пламени. Оно должно быть нормальным (восстановительным) с четким ядром, состоящим из ацетилена. Избыток кислорода (окислительное пламя) или ацетилена (науглероживающее) ухудшает качество шва.\n— Применение флюсов: При сварке цветных металлов (алюминий, медь) и некоторых сталей используются флюсы для удаления оксидной пленки, так как температура пламени ниже, чем у дуги.\n— Медленный нагрев и остывание: По сравнению со сваркой дугой, нагрев и остывание происходят медленнее. Это дает преимущество при сварке тонкостенных деталей, но увеличивает зону термического влияния и деформации.\n— Универсальность: Подходит для сварки тонких листов, труб, цветных металлов, чугуна, но имеет низкую производительность для толстых деталей.\n— Условия работы: Обязательна хорошая вентиляция из-за выделения вредных газов.\n\n2. Охарактеризуйте жидкие диэлектрики.\nСм. билет №2 и №4.\n\n3. Объясните, как происходит освобождение пострадавшего от воздействия электротока.\nОсвобождение от действия тока должно производиться быстро и безопасно.\n— Отключение электроустановки: По возможности выключить рубильник, вынуть вилку из розетки или отключить автомат. Это самый безопасный способ.\n— Отбрасывание провода: Если отключение невозможно, нужно отбросить провод от пострадавшего с помощью сухой палки, доски или другого предмета, не проводящего электричество.\n— Изоляция спасателя: Спасатель должен использовать диэлектрические перчатки (резиновые) или обмотать руки сухой тканью. В крайнем случае, встать на сухую доску или резиновый коврик, чтобы изолировать себя от земли.\n— Оттаскивание пострадавшего: Если необходимо оттащить пострадавшего, брать его следует только за сухую одежду, одной рукой, избегая касания тела (особенно обуви с металлическими гвоздями).`
