                text: `1. Охарактеризуйте назначение, устройство, принцип действия пьезоэлектрических извещателей.\nНазначение: Пьезоэлектрические извещатели предназначены для обнаружения ударных и вибрационных воздействий на охраняемые поверхности (стены, стекло, сейфы).\nУстройство: Основной элемент — пьезоэлектрическая пластина (кварц, титанат бария). При механической деформации на поверхности пластины возникает электрический заряд. К пластине прикреплена инерционная масса (груз) для повышения чувствительности.\nПринцип действия: При ударе или вибрации по охраняемой поверхности груз давит на пьезоэлемент, вызывая его деформацию. Генерируется электрический импульс. Электронная схема усиливает этот импульс, фильтрует его от помех (шум, ветер) и при обнаружении сигнала, характерного для ударного воздействия (по амплитуде и форме), формирует сигнал тревоги. Отличаются высокой чувствительностью и надежностью.\n\n2. Охарактеризуйте свойства и применение криопроводников.\nКриопроводники — это материалы, которые работают при сверхнизких температурах (криогенных), но не переходят в сверхпроводящее состояние. Чаще всего это обычные проводники (медь, алюминий) с очень малым удельным сопротивлением при низких температурах.\n— Свойства: При охлаждении до температур жидкого гелия (-269°C) или жидкого азота (-196°C) их удельное сопротивление уменьшается в десятки и сотни раз по сравнению с комнатной температурой. Остаточное сопротивление определяется примесями в металле.\n— Применение: Используются для создания мощных электромагнитов, которые не требуют сверхпроводящих материалов (хотя сверхпроводники для тех же целей более эффективны). Криопроводники применяются в измерительной технике, в качестве токоподводов к сверхпроводящим устройствам, в криоэлектронике.\n\n3. Перечислите и охарактеризуйте средства индивидуальной защиты.\nСредства индивидуальной защиты (СИЗ) предназначены для защиты одного работника от воздействия вредных факторов.\n— СИЗ головы: Каски, шлемы. Защищают от падающих предметов, ударов.\n— СИЗ органов дыхания: Респираторы, противогазы. Защищают от пыли, вредных газов и паров.\n— СИЗ рук: Перчатки, рукавицы. Защищают от порезов, химических веществ, вибрации.\n— СИЗ ног: Спецобувь. Защищает от падающих предметов, влаги, проколов, скольжения, статического электричества.\n— СИЗ глаз и лица: Очки, щитки. Защищают от летящих частиц, брызг химикатов, оптического излучения (сварка).\n— СИЗ органов слуха: Наушники, вкладыши (беруши). Защищают от шума.\n— СИЗ от падения с высоты: Предохранительные пояса, страховочные канаты.\n— Одежда специальная: Костюмы, халаты, куртки, брюки. Защищают от общих загрязнений, высоких температур, химических веществ.`

            {
                number: 25,

                text: `1. Опишите технологические особенности ручной дуговой сварки высокоуглеродистых сталей.\nВысокоуглеродистые стали (содержание углерода >0,6%) имеют низкую свариваемость из-за склонности к образованию закалочных структур (мартенсита) в зоне термического влияния, что приводит к трещинам.\nОсобенности сварки:\n— Предварительный и сопутствующий подогрев: Обязательный предварительный подогрев деталей до 200-300°C для замедления охлаждения и предотвращения закалки. Подогрев может поддерживаться в процессе сварки.\n— Послесварочная термообработка: Необходим немедленный медленный отжиг после сварки для снятия внутренних напряжений и уменьшения твердости.\n— Выбор электродов: Применяются электроды с низким содержанием водорода (основного типа), например, УОНИИ, для уменьшения вероятности образования холодных трещин. Малая сила тока.\n— Сварка в узких разделках: Для уменьшения объема наплавленного металла и, соответственно, усадки.\n— Сварка короткой дугой: Для получения более качественного шва и уменьшения зоны термического влияния.\n\n2. Дайте характеристику жаростойким проводниковым материалам.\nСм. билет №8.\n\n3. Перечислите состав аптечки первой (доврачебной) помощи.\nАптечка (автомобильная или производственная) должна содержать минимальный набор средств.\n— Перевязочные материалы: Бинты стерильные и нестерильные, вата, марлевые салфетки, бактерицидные и кровоостанавливающие пластыри, эластичный бинт.\n— Инструменты: Ножницы, пинцет, зажим.\n— Средства для остановки кровотечения: Жгут кровоостанавливающий.\n— Антисептики: Йод, зеленка, раствор перекиси водорода, спиртовые салфетки.\n— Обезболивающие и жаропонижающие: Анальгетики, аспирин, парацетамол.\n— Другие средства: Активированный уголь, жгут, нашатырный спирт, противошоковые препараты.\n— Инструкция: Схема оказания первой помощи.\n— Дыхательные маски: Для ИВЛ.`

                number: 27,

                text: `1. Охарактеризуйте назначение, устройство, принцип действия радиоволновых извещателей.\nНазначение: Радиоволновые извещатели предназначены для объемного обнаружения движения в помещении. Используют для охраны больших площадей и зон, где невозможно установить другие типы извещателей (сквозь стены, занавески).\nУстройство: Состоят из передающей и приемной антенн (СВЧ-антенны) и электронного блока, работающего на сверхвысоких частотах (СВЧ) — 2,4 ГГц или 10 ГГц.\nПринцип действия: Передатчик излучает непрерывный электромагнитный сигнал. Приемник принимает отраженный от объектов сигнал. При появлении движущегося объекта в поле излучения частота отраженного сигнала изменяется (эффект Доплера). Схема детектирует разницу частот и формирует сигнал тревоги. Проникают через легкие перегородки, но чувствительны к движению воды в трубах и металлическим конструкциям.\n\n2. Охарактеризуйте свойства, получение, маркировка и применение меди. Приведите примеры медных сплавов.\n— Свойства: Высокая электро- и теплопроводность (уступает только серебру), хорошая пластичность и ковкость, стойкость к коррозии (образуется плотная оксидная пленка), красивая окраска.\n— Получение: Из медных руд (сульфидных и оксидных) путем обогащения, плавки на штейн, конвертирования, рафинирования (огневое и электролитическое) для получения чистой меди.\n— Маркировка (ГОСТ): М0, М1, М2, М3 — чистота меди (чем больше число, тем больше примесей). М1р — раскисленная медь.\n— Применение: Провода, кабели, обмотки, токопроводящие шины, теплообменники, водопроводные трубы, посуда, монеты.\n— Сплавы:\n  - Латунь: Сплав меди с цинком (Cu+Zn). Применяется для изготовления арматуры, деталей машин, литья.\n  - Бронза: Сплав меди с оловом, алюминием, бериллием и другими металлами (кроме цинка и никеля). Применяется для литья художественных изделий, подшипников, пружин.\n  - Мельхиор: Сплав меди с никелем (Cu+Ni). Используется для монет, посуды, бижутерии.\n\n3. Объясните правила оказания первой (доврачебной) помощи: при ранениях и кровотечениях.\n— При ранениях:\n  - Остановить кровотечение (см. ниже).\n  - Промыть рану раствором перекиси водорода.\n  - Обработать края раны йодом или зеленкой.\n  - Наложить стерильную повязку.\n  - Обездвижить поврежденную часть тела.\n— При кровотечениях:\n  - Артериальное (алая кровь, пульсирующая струя): Наложить жгут выше места ранения (на 5-10 см). Под жгут подложить записку с временем наложения. Летом — на 1 час, зимой — на 30 минут. Если времени больше, ослабить жгут на 5 минут.\n  - Венозное (темная кровь, течет спокойно): Наложить давящую повязку на место раны.\n  - Капиллярное (поверхностное): Прижать пальцем или наложить давящую повязку.\n  - Носовое: Усадить пострадавшего, наклонить голову вперед, зажать нос на 10-15 минут, приложить холод к переносице.`

            {
                number: 29,
                subject: "Электроматериаловедение",
                text: `1. Опишите технологические особенности ручной сварки.\nРучная дуговая сварка (РДС) — наиболее универсальный вид сварки, выполняемый сварщиком вручную.\nОсобенности:\n— Ручное управление: Сварщик вручную перемещает электрод, поддерживая дугу, регулируя ее длину и скорость сварки. Качество шва сильно зависит от квалификации сварщика.\n— Универсальность: Позволяет сваривать детали из различных сталей и цветных металлов в любом пространственном положении (нижнее, вертикальное, потолочное).\n— Простота оборудования: Используются сварочные аппараты (трансформаторы, выпрямители, инверторы) и электроды (с покрытием).\n— Прерывистость процесса: После сваривания электрода необходимо его сменить, что создает кратеры и требует их заварки.\n— Тепловое влияние: Нагрев и остывание приводят к деформациям и внутренним напряжениям в металле.\n— Специфика покрытий: Использование электродов с различными покрытиями (рутиловое, основное) для разных условий сварки.\n\n2. Опишите, какие виды термической обработки существуют.\nТермическая обработка — это процессы нагрева, выдержки и охлаждения металлов для изменения их структуры и свойств.\n— Отжиг: Нагрев до определенной температуры, выдержка и медленное охлаждение (с печью). Цель: снятие внутренних напряжений, уменьшение твердости, улучшение обрабатываемости, измельчение зерна.\n— Нормализация: Нагрев и охлаждение на воздухе. Дает более однородную структуру и мелкое зерно, улучшая механические свойства.\n— Закалка: Нагрев до высокой температуры, выдержка и быстрое охлаждение (в воде или масле). Цель: повышение твердости и прочности. Обычно создает хрупкую структуру.\n— Отпуск: Нагрев закаленной стали до невысокой температуры (ниже критической) и охлаждение. Цель: снятие внутренних напряжений, снижение хрупкости, сохранение повышенной твердости. Проводится после закалки.\n\n3. Охарактеризуйте основные причины загораний в электроустановках.\nПожары в электроустановках возникают из-за выделения тепла, превышающего допустимые пределы.\n— Короткое замыкание (КЗ): Непосредственное соединение двух фаз или фазы с землей через малое сопротивление. Сопровождается огромным током и тепловыделением.\n— Перегрузка: Длительный ток, превышающий номинальный для данного провода, приводит к перегреву изоляции и ее возгоранию.\n— Переходные сопротивления: Большое сопротивление в местах соединения проводов (скрутки, окисленные контакты). Выделяющееся тепло вызывает нагрев и возгорание.\n— Внешние искры и дуги: Искрение при коммутации (выключении), при обрыве проводов, разряды статического электричества.\n— Электрическая дуга: Возникает при замыкании токоведущих частей с большой мощностью, вызывает ожоги и возгорание.\n— Попадание горючих веществ (масла, ветоши) на нагретые поверхности оборудования.`

            {
                number: 30,

                text: `1. Охарактеризуйте назначение, устройство, принцип действия пассивных оптико-электронных извещателей.\nСм. билет №22.\n\n2. Назовите основные методы испытания материалов.\nМетоды испытаний разделяются на механические, физические, химические и технологические.\n— Механические испытания:\n  - На растяжение: Определение предела прочности, относительного удлинения и сужения.\n  - На твердость: Измерение твердости по Бринеллю (шариком), Роквеллу (алмазным конусом), Виккерсу (пирамидкой).\n  - На ударную вязкость: Испытание на маятниковом копре.\n— Физические испытания:\n  - Магнитные: Определение магнитной проницаемости, коэрцитивной силы.\n  - Электрические: Измерение удельного сопротивления, пробивного напряжения (для диэлектриков).\n  - Термические: Определение температур плавления и теплопроводности.\n— Химические испытания: Определение химического состава (спектральный анализ).\n— Технологические пробы: Испытание на способность к деформации (изгибу, осадке) без разрушения.\n— Неразрушающий контроль: Рентгеновский, ультразвуковой, капиллярный контроль для обнаружения внутренних дефектов.\n\n3. Объясните, какое воздействие оказывают на безопасность труда физические, химические и биологические факторы?\n— Физические факторы: Это факторы, воздействующие на организм через физические поля и явления. Шум и вибрация снижают концентрацию внимания, ускоряют утомляемость, вызывают профессиональные заболевания (нейросенсорная тугоухость). Микроклимат (высокая или низкая температура) может вызвать тепловые удары или переохлаждение. Недостаточная освещенность ведет к травматизму. Движущиеся части машин — к механическим травмам.\n— Химические факторы: Воздействие вредных химических веществ (пары кислот, щелочей, тяжелых металлов, токсичных газов) через дыхательные пути, кожу или желудочно-кишечный тракт. Могут вызывать отравления, химические ожоги, аллергии, профессиональные заболевания (силикоз, пневмокониоз).\n— Биологические факторы: Влияние микроорганизмов (бактерий, вирусов, грибков), растительных и животных организмов. Могут быть возбудителями инфекционных заболеваний, аллергенов, выделять токсины.`
            }

        // -----------------------------------------------------------------

        // -----------------------------------------------------------------
        const overlay = document.getElementById('modalOverlay');
        const modalNumber = document.getElementById('modalNumber');
        const modalSubject = document.getElementById('modalSubject');
        const modalBody = document.getElementById('modalBody');
        const closeBtn = document.getElementById('closeModalBtn');

        function openModal(index) {
            const ticket = ticketsData[index];
            if (!ticket) return;

            modalNumber.textContent = ticket.number;
            modalSubject.textContent = ticket.subject;

            let text = ticket.text;

            // Обрабатываем ссылки "См. билет №X"
            text = text.replace(/См\.\s*билет\s*№(\d+)/g, (match, num) => {
                const targetIndex = parseInt(num) - 1;
                if (targetIndex >= 0 && targetIndex < ticketsData.length) {
                    return `<span class="ref-link" data-target="${targetIndex}">См. билет №${num}</span>`;
                }
                return match;
            });

            // Разбиваем на вопросы
            const blocks = [];
            const lines = text.split('\n');
            let currentBlock = '';
            let currentNum = '';
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const match = line.match(/^(\d+)\.\s/);
                if (match) {
                    if (currentBlock.trim()) {
                        blocks.push({ num: currentNum, text: currentBlock.trim() });
                    }
                    currentNum = match[1];
                    currentBlock = line.replace(/^\d+\.\s/, '');
                } else {
                    currentBlock += '\n' + line;
                }
            }
            if (currentBlock.trim()) {
                blocks.push({ num: currentNum, text: currentBlock.trim() });
            }

            // Формируем HTML с форматированием списков
            let html = '';
            blocks.forEach(block => {
                const formattedText = formatLists(block.text);
                const linesArr = formattedText.split('\n');
                const title = linesArr[0] || '';
                const rest = linesArr.slice(1).join('\n');

                html += `<div class="q-block">
                    <span class="q-num">${block.num}</span>
                    <span class="q-title">${title}</span>
                    <div class="q-text">${rest}</div>
                </div>`;
            });

            modalBody.innerHTML = html;

            // Обработчики для ссылок
            document.querySelectorAll('.ref-link').forEach(el => {
                el.addEventListener('click', function(e) {
                    const target = parseInt(this.dataset.target);
                    if (!isNaN(target) && target >= 0 && target < ticketsData.length) {
                        closeModal();
                        setTimeout(() => openModal(target), 350);
                    }
                });
            });

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        console.log('✅ Все 30 билетов загружены. Группа 543.');
    })();
</script>
</body>
</html>
